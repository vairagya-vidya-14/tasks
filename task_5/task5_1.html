<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gallery</title>
  </head>
  <body>
    <h1 align="center">Image Gallery Using Tables and Nested Tables</h1>
    <table border="10" width="500" height="500" align="center">
      <tr>
        <td>
          <table border="1">
            <th align="left">Mountains Gallery</th>

            <tr>
              <td>
                <img src="mountain.avif" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Mountain View</td>
            </tr>
            <tr>
              <td><img src="snowy.webp" width="300px" height="300px" /></td>
            </tr>
            <tr>
              <td>Snowy Peaks</td>
            </tr>
          </table>
        </td>
        <td>
          <table border="1">
            <th align="left">Forest Gallery</th>

            <tr>
              <td>
                <img src="forest.jpg" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Green Forest</td>
            </tr>
            <tr>
              <td><img src="path.webp" width="300px" height="300px" /></td>
            </tr>
            <tr>
              <td>Forest Path</td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td>
          <table border="1">
            <th align="left">Beach Gallery</th>

            <tr>
              <td>
                <img src="sunny.webp" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Sunny Beach</td>
            </tr>
            <tr>
              <td><img src="wave.webp" width="300px" height="300px" /></td>
            </tr>
            <tr>
              <td>Ocean Waves</td>
            </tr>
          </table>
        </td>
        <td>
          <table border="1">
            <th align="left">City Gallery</th>

            <tr>
              <td>
                <img src="city.webp" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>City Street</td>
            </tr>
            <tr>
              <td><img src="night.webp" width="300px" height="300px" /></td>
            </tr>
            <tr>
              <td>Night Skyline</td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td>
          <table border="1">
            <th align="left">Wildlife Gallery</th>

            <tr>
              <td>
                <img src="fox.jpg" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Fox</td>
            </tr>
            <tr>
              <td><img src="dog.jpg" width="300px" height="300px" /></td>
            </tr>
            <tr>
              <td>Dog</td>
            </tr>
          </table>
        </td>
        <td>
          <table border="3">
            <th align="left">Lake Gallery</th>

            <tr>
              <td>
                <img src="lake.webp" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Beautiful Lake</td>
            </tr>
            <tr>
              <td>
                <img src="reflectionlake.webp" width="300px" height="300px" />
              </td>
            </tr>
            <tr>
              <td>Lake Reflection</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
